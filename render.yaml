# Render 部署配置
# 使用 Render Web Service 部署 Node.js API + 静态文件

services:
  - type: web
    name: mitochondrial-website
    env: node
    region: singapore  # 或选择离您近的区域: oregon, frankfurt, singapore
    plan: free
    buildCommand: rm -rf node_modules package-lock.json && npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
